spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

discord:
  bot:
    token: ${DISCORD_BOT_TOKEN}

bot:
  commands:
    lang: ${BOT_COMMANDS_LANG:ru}
